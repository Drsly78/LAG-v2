<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="L'Arrêt Gourmand">
<meta name="theme-color" content="#fff7ee">
<link rel="manifest" href="manifest.json">
<title>🍔 L'Arrêt Gourmand v2</title>
<style>
  :root{
    --bg:#fffaf4;
    --bg-soft:#fff4e7;
    --panel:#ffffff;
    --panel-2:#fff8ef;
    --line:#f1d7b7;
    --gold:#d77a11;
    --gold-2:#f3a43a;
    --text:#111111;
    --text-soft:#3d3d3d;
    --green:#1f9d61;
    --red:#d94f4f;
    --orange:#e58b21;
    --shadow:0 10px 26px rgba(168,108,36,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    min-height:100vh;
    font-family:Georgia,serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, rgba(243,164,58,.14), transparent 24%),
      linear-gradient(180deg,#fffdf9 0%, #fff6ec 100%);
  }
  button,input{font-family:Georgia,serif}
  .app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* HEADER */
  .header{
    position:sticky;top:0;z-index:100;
    padding:max(14px, env(safe-area-inset-top)) 16px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    background:rgba(255,250,244,.94);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  .header-center{flex:1;text-align:center}
  .header-title{font-size:24px;font-weight:bold;letter-spacing:1px;color:var(--gold)}
  .header-right{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:16px;
    padding:10px 12px;
    min-width:132px;
    cursor:pointer;
    transition:.15s ease;
  }
  .header-right:active{transform:scale(.97)}
  .header-ca-label{font-size:10px;color:var(--text-soft);text-align:right;letter-spacing:1.6px}
  .header-ca-amount{font-size:22px;font-weight:bold;color:var(--green);text-align:right;margin-top:2px}
  .header-ca-hint{font-size:9px;color:var(--gold);text-align:right;margin-top:1px;letter-spacing:.8px}

  /* TABS */
  .tabs{
    position:sticky;top:78px;z-index:99;
    display:flex;gap:8px;padding:10px 12px;
    background:rgba(255,247,238,.95);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    flex:1;border:none;cursor:pointer;padding:10px 4px;
    border-radius:14px;font-size:11px;color:var(--text);
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    transition:.18s ease;
    text-align:center;
    font-weight:bold;
    display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;
  }
  .tab-btn .tab-icon{font-size:18px;line-height:1}
  .tab-btn.active{
    color:#ffffff;
    background:linear-gradient(180deg,var(--gold-2),var(--gold));
    box-shadow:0 10px 20px rgba(215,122,17,.18);
  }
  .content{flex:1;overflow-y:auto;padding-bottom:24px}
  .pad{padding:16px}
  .section-title{
    font-size:11px;font-weight:bold;letter-spacing:2.4px;
    color:var(--text-soft);text-transform:uppercase;margin:16px 0 10px;
    padding-bottom:6px;border-bottom:1px solid var(--line);
  }
  .grid-2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  @media(max-width:360px){
    .grid-2{grid-template-columns:1fr 1fr}
    .grid-4{grid-template-columns:1fr 1fr}
  }
  @media(min-width:600px){
    .grid-2{grid-template-columns:repeat(4,1fr)}
    .grid-4{grid-template-columns:repeat(4,1fr)}
  }
  @media(min-width:900px){
    .grid-2{grid-template-columns:repeat(5,1fr)}
  }
  .burger-card,.option-card,.mini-card{
    width:100%;cursor:pointer;position:relative;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow);
    transition:.18s ease;
    text-align:center;
  }
  .burger-card{padding:12px 8px;min-height:70px}
  .option-card{padding:10px 6px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .mini-card{padding:12px 8px;min-height:70px}
  .combo-card{
    width:100%;cursor:pointer;position:relative;
    background:linear-gradient(135deg,#fff8e1,#fff0cc);
    border:2px solid #e8c46a;
    border-radius:18px;
    box-shadow:var(--shadow);
    transition:.18s ease;
    text-align:center;
    padding:18px 12px;
    grid-column: span 2;
    display:flex;align-items:center;justify-content:space-between;
    gap:16px;
  }
  .combo-card-inner{flex:1;text-align:left}
  .combo-card-badge{
    background:linear-gradient(180deg,var(--gold-2),var(--gold));
    color:white;border-radius:12px;padding:5px 12px;
    font-size:12px;font-weight:bold;letter-spacing:1px;white-space:nowrap;
  }
  .burger-card:active,.option-card:active,.mini-card:active,.combo-card:active,.btn:active,.remove-btn:active,.stock-step:active,.stock-save:active{transform:scale(.98)}
  .burger-card.unavailable,.option-card.unavailable,.mini-card.unavailable{
    opacity:.45;cursor:not-allowed;background:#f6efe7;border-color:#eadbc8;
  }
  .burger-card-name,.mini-name{font-size:15px;font-weight:bold;color:var(--text);line-height:1.2;text-align:center}
  .burger-card-price,.mini-price{margin-top:6px;font-size:14px;font-weight:bold;color:var(--gold);text-align:center}
  .mini-sub{font-size:12px;color:var(--text-soft);margin-top:4px;text-align:center}
  .epuise-badge{
    position:absolute;top:8px;right:8px;font-size:9px;letter-spacing:1px;
    padding:3px 6px;border-radius:999px;background:#fce0e0;color:var(--red);
  }

  /* CUISSON COLORS */
  .cuisson-bleu{background:linear-gradient(180deg,#dde8ff,#c0d0f0)!important;border-color:#7ea0e0!important}
  .cuisson-saignant{background:linear-gradient(180deg,#d8f5e8,#b8e8d0)!important;border-color:#5cbb8a!important}
  .cuisson-apoint{background:linear-gradient(180deg,#fff0d8,#ffe0b0)!important;border-color:#e8a040!important}
  .cuisson-biencuit{background:linear-gradient(180deg,#ffe0d8,#ffc8b8)!important;border-color:#e05030!important}
  .cuisson-bleu.selected{background:linear-gradient(180deg,#4a70d0,#2a50b0)!important;color:white!important}
  .cuisson-saignant.selected{background:linear-gradient(180deg,#2db870,#1a9058)!important;color:white!important}
  .cuisson-apoint.selected{background:linear-gradient(180deg,#e89030,#c06010)!important;color:white!important}
  .cuisson-biencuit.selected{background:linear-gradient(180deg,#d84020,#b02010)!important;color:white!important}
  .cuisson-dot{
    display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;
    vertical-align:middle;
  }
  .dot-bleu{background:#2a50b0}
  .dot-saignant{background:#1a9058}
  .dot-apoint{background:#c06010}
  .dot-biencuit{background:#b02010}

  /* TICKET */
  .ticket,.order-card,.recap,.stock-card,.summary-card,.history-card{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:22px;
    box-shadow:var(--shadow);
  }
  .ticket,.order-card,.recap,.stock-card,.summary-card,.history-card{padding:16px}
  .ticket{margin-top:16px;border-color:#ecc791}
  .ticket-title{font-size:13px;font-weight:bold;color:var(--text);letter-spacing:1.3px;margin-bottom:10px}
  .ticket-item,.order-item,.history-order-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line);
  }
  .ticket-item:last-child,.order-item:last-child,.history-order-row:last-child{border-bottom:none}
  .ticket-item-name,.order-item-name{font-size:14px;font-weight:bold;color:var(--text)}
  .ticket-item-sub,.order-item-sub,.history-order-sub{font-size:12px;color:var(--text-soft);margin-top:2px}
  .ticket-item-price,.history-order-total{font-size:15px;color:var(--gold);font-weight:bold;min-width:60px;text-align:right}
  .ticket-item-edit{
    border:none;background:#fff0d8;color:var(--gold);
    border-radius:10px;padding:4px 10px;font-size:11px;
    cursor:pointer;white-space:nowrap;margin-top:4px;
    border:1px solid #ecc791;
  }
  .remove-btn{
    border:none;width:30px;height:30px;border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:#fce8e8;color:var(--red);font-size:18px;
  }
  .ticket-footer{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px}
  .ticket-count{font-size:13px;color:var(--text-soft)}
  .ticket-total{font-size:26px;font-weight:bold;color:var(--green);margin-top:2px}
  /* ── BOUTONS D'ACTION ── */
  .btn{
    border:none;cursor:pointer;
    border-radius:16px;
    padding:14px 20px;
    font-size:14px;font-weight:bold;
    font-family:Georgia,serif;
    letter-spacing:.3px;
    transition:.15s ease;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
  }
  .btn-green{
    background:linear-gradient(180deg,#3ecf80,#1f9d61);
    color:white;
    box-shadow:0 4px 16px rgba(31,157,97,.28);
  }
  .btn-pay{
    flex:2;
    background:linear-gradient(180deg,#3ecf80,#1f9d61);
    color:white;
    box-shadow:0 4px 16px rgba(31,157,97,.28);
  }
  .btn-primary{
    width:100%;
    background:linear-gradient(180deg,#5ba8f5,#2c6fba);
    color:white;
    box-shadow:0 4px 16px rgba(44,111,186,.28);
  }
  .btn-cancel{
    flex:1;
    background:linear-gradient(180deg,#fff5f5,#fce8e8);
    color:var(--red);
    border:1px solid #f1c7c7;
    box-shadow:none;
  }
  .btn-back{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    color:var(--text-soft);
    border:1px solid var(--line);
    box-shadow:none;
    padding:10px 16px;
    font-size:13px;
  }
  .btn-reset{
    width:100%;margin-top:14px;
    background:transparent;
    color:var(--red);
    border:2px solid #efc3c3;
    box-shadow:none;
  }
  .btn-export{
    width:100%;margin-top:10px;
    background:linear-gradient(180deg,#5ba8f5,#2c6fba);
    color:white;
    box-shadow:0 4px 16px rgba(44,111,186,.25);
  }
  /* Police montants */
  .ticket-total,.order-total,.recap-total span:last-child,
  .ticket-item-price,.history-order-total,.ca-total-value,
  .ca-stat-val,.header-ca-amount,.summary-value{
    font-family:'Courier New',Courier,monospace;
    letter-spacing:-.5px;
  }
  .options-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .options-title{font-size:17px;font-weight:bold;color:var(--text)}
  .option-card.selected{
    background:linear-gradient(180deg,#fff1dc,#ffe6be);
    border-color:#efc587;
  }
  .option-card-label{font-size:12px;color:var(--text);text-align:center}
  .option-card.selected .option-card-label{font-weight:bold}
  .option-card-price{margin-top:4px;font-size:13px;color:var(--text-soft);text-align:center}
  .option-card.selected .option-card-price{color:var(--gold)}
  .recap{margin-bottom:16px}
  .recap-row,.recap-total{display:flex;justify-content:space-between;gap:12px}
  .recap-row{font-size:14px;margin-bottom:6px;color:var(--text)}
  .recap-row span:last-child{font-weight:bold;color:var(--green)}
  .recap-row.sub{font-size:13px;color:var(--text-soft)}
  .recap-row.sub span:last-child{color:var(--green)}
  .recap-total{
    border-top:1px solid var(--line);margin-top:8px;padding-top:10px;
    color:var(--text);font-size:17px;font-weight:bold;
  }
  .order-header,.history-order-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
  .order-num,.history-order-num{
    background:linear-gradient(180deg,var(--gold-2),var(--gold));color:white;
    border-radius:12px;padding:5px 12px;font-weight:bold;font-size:18px;
  }
  .order-total{font-size:22px;font-weight:bold;color:var(--green)}
  .order-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .history-label{font-size:13px;color:var(--text-soft);letter-spacing:2px;margin:22px 0 10px}
  .history-item{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:#fffdf9;border:1px solid var(--line);
    border-radius:16px;padding:12px;margin-bottom:8px;opacity:.95;
  }
  .history-num{background:#fff0d8;color:var(--text);border-radius:10px;padding:4px 10px;font-size:14px;font-weight:bold}
  .history-count{font-size:13px;color:var(--text-soft)}
  .history-total{color:var(--green);font-size:16px;font-weight:bold}
  .summary-card{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .summary-label{color:var(--text);font-size:13px}
  .summary-value{color:var(--green);font-size:24px;font-weight:bold}
  .alert-box{
    background:#fff3e6;
    border:1px solid #f2d4aa;
    border-radius:18px;padding:14px;margin-bottom:16px;
  }
  .alert-out{color:var(--red);font-size:13px;font-weight:bold}
  .alert-low{color:var(--orange);font-size:13px;margin-top:4px}
  .stock-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 0;border-bottom:1px solid var(--line);
  }
  .stock-item:last-child{border-bottom:none}
  .stock-name{flex:1;font-size:15px;color:var(--text)}
  .stock-name.low{color:var(--orange)}
  .stock-name.out{color:var(--red)}
  .stock-inline{display:flex;align-items:center;gap:8px}
  .stock-step,.stock-save{
    border:none;cursor:pointer;border-radius:12px;
    width:38px;height:38px;font-size:20px;font-weight:bold;
  }
  .stock-step{background:#fff0db;color:var(--text)}
  .stock-save{
    width:auto;padding:0 12px;background:linear-gradient(180deg,var(--gold-2),var(--gold));color:white;font-size:12px;
  }
  .edit-input{
    width:74px;height:38px;border-radius:12px;border:1px solid var(--line);
    background:white;color:var(--text);text-align:center;font-size:16px;
  }

  /* MODALS */
  .modal-overlay{
    position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
    background:rgba(110,80,40,.22);
  }
  .modal{
    width:100%;max-width:340px;text-align:center;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:24px;padding:24px;box-shadow:var(--shadow);
  }
  .modal-wide{max-width:460px;text-align:left;max-height:80vh;overflow-y:auto}
  .modal-icon{font-size:32px;margin-bottom:8px}
  .modal-title{font-size:18px;font-weight:bold;color:var(--text);margin-bottom:8px;text-align:center}
  .modal-text{font-size:13px;color:var(--text-soft);margin-bottom:20px;line-height:1.4;text-align:center}
  .modal-actions{display:flex;gap:10px}
  .modal-cancel,.modal-confirm{
    flex:1;border:none;border-radius:14px;padding:12px;cursor:pointer;font-weight:bold;
  }
  .modal-cancel{background:#f7ecdf;color:var(--text)}
  .modal-confirm{background:linear-gradient(180deg,#f17f7f,#d94f4f);color:white}

  /* CA DETAIL MODAL */
  .ca-detail-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;
  }
  .ca-detail-row:last-child{border-bottom:none}
  .ca-detail-num{
    background:linear-gradient(180deg,var(--gold-2),var(--gold));color:white;
    border-radius:10px;padding:4px 12px;font-weight:bold;font-size:14px;white-space:nowrap;font-family:Georgia,serif;letter-spacing:.3px;
  }
  .ca-detail-items{flex:1;margin-left:8px}
  .ca-detail-item{font-size:12px;color:var(--text-soft);margin-top:2px}
  .ca-detail-price{font-size:14px;font-weight:bold;color:var(--green);white-space:nowrap}
  .ca-total-bar{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:14px;padding:14px;
    background:linear-gradient(135deg,#f0faf5,#dff5e8);
    border-radius:16px;border:1px solid #b0e0c0;
  }
  .ca-total-label{font-size:13px;font-weight:bold;letter-spacing:1.5px;color:var(--text)}
  .ca-total-value{font-size:24px;font-weight:bold;color:var(--green)}
  .ca-stats{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;
  }
  .ca-stat{
    background:#fffdf9;border:1px solid var(--line);border-radius:12px;
    padding:12px 8px;text-align:center;
  }
  .ca-stat-val{font-size:24px;font-weight:bold;color:var(--gold);font-family:Georgia,serif}
  .ca-stat-label{font-size:10px;color:var(--text-soft);letter-spacing:1.2px;margin-top:4px;font-weight:bold;text-transform:uppercase}
  .ca-btn-row{display:flex;gap:10px;margin-top:14px}
  .ca-btn-row button{flex:1;margin-top:0!important;width:auto!important}

  /* REMOVAL BUTTONS */
  .removal-btn{
    width:100%;border:none;cursor:pointer;border-radius:12px;padding:9px 8px;
    text-align:center;font-size:12px;transition:.15s ease;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);color:var(--text);
  }
  .removal-btn.removed{
    background:linear-gradient(180deg,#fce8e8,#f9d0d0);
    border-color:#e8a0a0;color:var(--red);
    text-decoration:line-through;
  }
  .menu-drop-zone{
    transition:background .15s,border-color .15s;
    border-radius:14px;
  }
  .menu-drop-zone.drag-over{
    background:rgba(215,122,17,.10) !important;
    border:2px dashed var(--gold) !important;
    border-radius:14px;
  }
  .draggable-frite{
    cursor:grab;display:flex;align-items:center;justify-content:space-between;
    padding:6px 8px;border-radius:10px;border:1px dashed var(--line);
    background:#fffaf4;touch-action:none;user-select:none;
  }
  .draggable-frite:active{ cursor:grabbing; }
  .header-agenda-btn{
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 10px;
    cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:20px;
    transition:.15s ease;
  }
  .header-agenda-btn:active{transform:scale(.96)}
  .header-agenda-label{font-size:9px;color:var(--text-soft);letter-spacing:1.4px;font-weight:bold}
  .agenda-slot-row{
    padding:10px 0;border-bottom:1px solid var(--line);
  }
  .agenda-slot-row:last-child{border-bottom:none}
  .agenda-slot-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .agenda-slot-time{
    font-size:14px;font-weight:bold;
    background:linear-gradient(180deg,var(--gold-2),var(--gold));
    color:white;border-radius:8px;padding:3px 10px;
  }
  .agenda-slot-counts{display:flex;gap:6px}
  .agenda-slot-pill{
    font-size:11px;border-radius:6px;padding:2px 8px;font-weight:bold;
    background:#fff0d8;color:var(--gold);border:1px solid #ecc791;
  }
  .agenda-slot-pill.red{background:#fce8e8;color:var(--red);border-color:#e8a0a0}
  .agenda-order-line{font-size:12px;color:var(--text-soft);padding:2px 0 2px 8px;border-left:2px solid var(--line)}
  .agenda-order-line.paye{border-left-color:#1a9058}
  .agenda-order-line.encours{border-left-color:var(--gold)}
  .empty-icon{font-size:44px;margin-bottom:10px}

  /* SLOT PICKER */
  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
  .slot-section-label{
    font-size:10px;font-weight:bold;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--text-soft);text-align:center;
    padding:8px 0 6px;margin-bottom:2px;
    grid-column:span 3;
    border-top:1px solid var(--line);
  }
  .slot-section-label:first-child{border-top:none;padding-top:0}
  .slot-btn{
    border:2px solid var(--line);cursor:pointer;
    border-radius:16px;padding:11px 6px;
    background:linear-gradient(180deg,var(--panel),var(--panel-2));
    text-align:center;transition:.15s ease;

// Garnitures retirables par burger — groupées par catégorie

const SUPPLEMENTS = [
  { id:"double",  name:"Double steak & fromage", price:5, ing:["boeuf","boeuf","cheddar","cheddar"] },
  { id:"fromage", name:"Cheddar",                 price:2, ing:["cheddar"] },

const BURGER_FRIES = [
  { id:"bfNature",  name:"Nature",                 price:2.5, ing:[] },
  { id:"bfTruf",    name:"Truffées",               price:4.5, ing:["truffees"] },

];

const SOLO_FRIES = [
  { id:"sfNature",  name:"Frites natures",               price:3.5, ing:[] },
  { id:"sfTruf",    name:"Frites truffées",              price:5.5, ing:["truffees"] },
  { id:"sfChed",    name:"Frites cheddar",               price:5.5, ing:["cheddar"] },
  { id:"sfChedOig", name:"Frites cheddar oignons",       price:6,   ing:["cheddar"] },
  { id:"sfChedBac", name:"Frites cheddar bacon",         price:6.5, ing:["cheddar"] },
  { id:"sfFull",    name:"Frites cheddar bacon oignon",  price:7,   ing:["cheddar"] }
];

const DRINKS = [
  { id:"soft",       name:"Soft",       price:2,   ing:[] },
  { id:"heineken",   name:"Heineken",   price:3.5, ing:[] },
  { id:"desperados", name:"Desperados", price:4,   ing:[] }
];

const CUISSONS = [
  { id:"bleu",     name:"Bleu",      cssClass:"cuisson-bleu",     dotClass:"dot-bleu" },
  { id:"saignant", name:"Saignant",  cssClass:"cuisson-saignant", dotClass:"dot-saignant" },
  { id:"apoint",   name:"À point",   cssClass:"cuisson-apoint",   dotClass:"dot-apoint" },
  { id:"biencuit", name:"Bien cuit", cssClass:"cuisson-biencuit", dotClass:"dot-biencuit" }
];

// Combo Steak + Frites
const STEAK_FRITES = { id:"steakfrites", name:"Steak + Frites", price:7.5, ing:["boeuf"] };

let state = {
  tab:"caisse",
  ingredients: JSON.parse(JSON.stringify(INGREDIENTS_DEFAULT)),
  orders:[],
  orderNum:1,
  currentItems:[],
  dailyRevenue:0,
  loyaltyCount:0,
  step:"burger",
  pendingBurger:null,
  pendingSupps:[],
  pendingFrite:null,
  pendingDrink:null,
  pendingCuisson:null,
  editingItemKey:null,
  loyaltyActive:false,
  pendingRemovals:[],
  showCustomization:false,
  friteMenuPairing:{}, // burgerKey → friteKey
  dropTargetBurgerKey:null
};

const STORAGE_KEYS = {
  ingredients:"ft7_ingredients",
  orders:"ft7_orders",
  orderNum:"ft7_orderNum",
  revenue:"ft7_revenue",
  loyalty:"ft7_loyalty",
  sheetsUrl:"ft7_sheets_url"
};

// ---- GOOGLE SHEETS SYNC ----
function getSheetsUrl(){ return localStorage.getItem(STORAGE_KEYS.sheetsUrl) || ''; }
function setSheetsUrl(url){ localStorage.setItem(STORAGE_KEYS.sheetsUrl, url.trim()); }

function syncOrderToSheets(order){
  const url = getSheetsUrl();
  if(!url) return;
  const date = new Date();
  const dateStr = date.toLocaleDateString('fr-FR');
  const timeStr = date.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
  const items = order.items.map(i => {
    if(i.type === 'steakfrites') return 'Steak+Frites';
    if(i.type === 'fries') return i.fries.name;
    if(i.type === 'drink') return i.drink.name;
    const extras = [
      i.cuisson ? cuissonLabel(i.cuisson) : null,
      ...(i.supplements||[]).map(s => '+'+s.name),
      i.frite ? '+Frites '+i.frite.name : null,
      i.drink ? '+'+i.drink.name : null,
      ...(i.removals||[]).map(r => '-'+r)
    ].filter(Boolean);
    return i.burger.name + (extras.length ? ' ('+extras.join(', ')+')' : '');
  }).join(' | ');
  const ttc = order.total;
  const ht  = ttc / 1.10;
  const tva = ttc - ht;
  const payload = {
    id: order.id,
    date: dateStr,
    heure: timeStr,
    creneau: order.slot || '',
    statut: order.status === 'paye' ? 'Reglée' : order.status === 'annule' ? 'Annulée' : 'En cours',
    articles: items,
    total_ttc: fmtNum(ttc),
    total_ht: fmtNum(ht),
    tva: fmtNum(tva),
    fidelite: order.loyalty ? 'Oui' : 'Non'
  };
  fetch(url, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).catch(() => {});
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEYS.ingredients, JSON.stringify(state.ingredients));
    localStorage.setItem(STORAGE_KEYS.orders, JSON.stringify(state.orders));
    localStorage.setItem(STORAGE_KEYS.orderNum, JSON.stringify(state.orderNum));
    localStorage.setItem(STORAGE_KEYS.revenue, JSON.stringify(state.dailyRevenue));
    localStorage.setItem(STORAGE_KEYS.loyalty, JSON.stringify(state.loyaltyCount));
  }catch(e){}
}
function loadState(){
  try{
    const i = localStorage.getItem(STORAGE_KEYS.ingredients);
    const o = localStorage.getItem(STORAGE_KEYS.orders);
    const n = localStorage.getItem(STORAGE_KEYS.orderNum);
    const r = localStorage.getItem(STORAGE_KEYS.revenue);
    const l = localStorage.getItem(STORAGE_KEYS.loyalty);
    if(i) state.ingredients = JSON.parse(i);
    if(o) state.orders = JSON.parse(o);
    if(n) state.orderNum = JSON.parse(n);
    if(r) state.dailyRevenue = JSON.parse(r);
    if(l) state.loyaltyCount = JSON.parse(l);
  }catch(e){}
}
function fmt(n){ return Number(n || 0).toFixed(2).replace(".", ",") + " €"; }
function fmtNum(n){ return Number(n || 0).toFixed(2).replace(".", ","); }
function countNeeded(ingList){
  const counts = {};
  for(const k of ingList){ counts[k] = (counts[k] || 0) + 1; }
  return counts;
}
function getItemIngredients(item){
  if(item.type === "fries" || item.type === "fries-menu") return [...(item.fries.ing || [])];
  if(item.type === "drink") return [...(item.drink.ing || [])];
  if(item.type === "steakfrites") return ["boeuf"];
  return [
    ...item.burger.ing,
    ...(item.supplements || []).flatMap(s => s.ing || []),
    ...(item.frite?.ing || []),
    ...(item.drink?.ing || [])
  ];
}
// Stock réel = stock actuel − ce qui est déjà dans le ticket en cours (non encore confirmé)
function availableStock(excludeKey){
  const reserved = {};
  for(const item of state.currentItems){
    if(excludeKey && item.key === excludeKey) continue; // ne pas compter l'item qu'on est en train d'éditer
    for(const [k, qty] of Object.entries(countNeeded(getItemIngredients(item)))){
      reserved[k] = (reserved[k] || 0) + qty;
    }
  }
  const avail = {};
  for(const [k, ing] of Object.entries(state.ingredients)){
    avail[k] = Math.max(0, ing.qty - (reserved[k] || 0));
  }
  return avail;
}
function ingredientsAvailable(ingList){
  const stock = availableStock(state.editingItemKey || null);
  const needed = countNeeded(ingList);
  return Object.entries(needed).every(([k, qty]) => (stock[k] ?? 999999) >= qty);
}
function burgerAvailable(burger){ return ingredientsAvailable(burger.ing); }
function optionAvailable(option){ return ingredientsAvailable(option.ing || []); }
function itemTotal(item){
  if(item.type === "fries" || item.type === "fries-menu") return item.fries.price;
  if(item.type === "drink") return item.drink.price;
  if(item.type === "steakfrites") return STEAK_FRITES.price;
  const suppTotal = (item.supplements || []).reduce((s, x) => s + x.price, 0);
  return item.burger.price + suppTotal + (item.frite?.price || 0) + (item.drink?.price || 0);
}
function ticketTotal(){
  const raw = state.currentItems.reduce((sum, item) => sum + itemTotal(item), 0);
  return state.loyaltyActive ? Math.max(0, raw - 10) : raw;
}

function cuissonLabel(cuissonId){
  if(!cuissonId) return '';
  const c = CUISSONS.find(x => x.id === cuissonId);
  return c ? c.name : '';
}
function cuissonColor(cuissonId){
  const map = { bleu:"#2a50b0", saignant:"#1a9058", apoint:"#c06010", biencuit:"#b02010" };
  return map[cuissonId] || "var(--text)";
}
function cuissonDot(cuissonId){
  if(!cuissonId) return '';
  const c = CUISSONS.find(x => x.id === cuissonId);
  return c ? `<span class="cuisson-dot ${c.dotClass}"></span>` : '';
}

function selectBurger(id){
  const burger = BURGERS.find(x => x.id === id);
  if(!burger || !burgerAvailable(burger)) return;
  state.pendingBurger = burger;
  state.pendingSupps = [];
  state.pendingFrite = burger.noDefaultFrite ? null : BURGER_FRIES.find(x => x.id === "bfNature");
  state.pendingDrink = null;
  state.pendingCuisson = "saignant";
  state.pendingRemovals = [];
  state.showCustomization = false;
  state.editingItemKey = null;
  state.step = "options";
  render();
}

// Edit an existing burger item from the ticket
function editItem(key){
  const item = state.currentItems.find(i => i.key === key);
  if(!item || item.type !== "burger") return;
  state.pendingBurger = item.burger;
  state.pendingSupps = [...(item.supplements || [])];
  state.pendingFrite = item.frite || null;
  state.pendingDrink = item.drink || null;
  state.pendingCuisson = item.cuisson || "saignant";
  state.pendingRemovals = [...(item.removals || [])];
  state.showCustomization = (item.removals||[]).length > 0;
  state.editingItemKey = key;
  state.step = "options";
  render();
}

function toggleSupp(id){
  const supp = SUPPLEMENTS.find(x => x.id === id);
  if(!supp || !optionAvailable(supp)) return;
  const exists = state.pendingSupps.some(s => s.id === id);
  state.pendingSupps = exists ? state.pendingSupps.filter(s => s.id !== id) : [...state.pendingSupps, supp];
  render();
}
function selectFrite(id){
  if(id === null){ state.pendingFrite = null; render(); return; }
  const fries = BURGER_FRIES.find(x => x.id === id);
  if(!fries || !optionAvailable(fries)) return;
  state.pendingFrite = state.pendingFrite?.id === id ? null : fries;
  render();
}
function selectDrink(id){
  if(id === null){ state.pendingDrink = null; render(); return; }
  const drink = DRINKS.find(x => x.id === id);
  if(!drink) return;
  state.pendingDrink = state.pendingDrink?.id === id ? null : drink;
  render();
}
function selectCuisson(id){
  state.pendingCuisson = state.pendingCuisson === id ? null : id;
  render();
}
function addBurgerItem(){
  if(!state.pendingBurger) return;
  const item = {
    type:"burger",
    burger:state.pendingBurger,
    supplements:[...state.pendingSupps],
    cuisson:state.pendingCuisson,
    removals:[...state.pendingRemovals],
    key:state.editingItemKey || (Date.now() + Math.random())
  };
  if(!ingredientsAvailable(getItemIngredients(item))) return;

  if(state.editingItemKey){
    state.currentItems = state.currentItems.map(i => i.key === state.editingItemKey ? item : i);
  } else {
    state.currentItems.push(item);
  }

  state.pendingBurger = null;
  state.pendingSupps = [];
  state.pendingFrite = null;
  state.pendingDrink = null;
  state.pendingCuisson = null;
  state.pendingRemovals = [];
  state.showCustomization = false;
  state.editingItemKey = null;
  state.step = "burger";
  render();
  const scrollTop = () => {
    const c = document.getElementById("content");
    if(c) c.scrollTop = 0;
    window.scrollTo(0, 0);
  };
  requestAnimationFrame(() => requestAnimationFrame(scrollTop));
  setTimeout(scrollTop, 50);
}
function addSoloFries(id){
  const fries = SOLO_FRIES.find(x => x.id === id);
  if(!fries || !optionAvailable(fries)) return;
  state.currentItems.push({ type:"fries", fries, key:Date.now() + Math.random() });
  render();
}
function addSteakFrites(){
  if(!ingredientsAvailable(["boeuf"])) return;
  state.currentItems.push({ type:"steakfrites", key:Date.now() + Math.random() });
  render();
}
function addDrink(id){
  const drink = DRINKS.find(x => x.id === id);
  if(!drink) return;
  state.currentItems.push({ type:"drink", drink, key:Date.now() + Math.random() });
  render();
}
function removeItem(key){
  state.currentItems = state.currentItems.filter(i => i.key !== key);
  // Nettoyer le pairing si burger ou frite supprimé
  delete state.friteMenuPairing[key];
  Object.keys(state.friteMenuPairing).forEach(bk => {
    if(state.friteMenuPairing[bk] === key) state.friteMenuPairing[bk] = null;
  });
  render();
}
function goBackToBurger(){
  state.step = "burger";
  state.pendingBurger = null;
  state.pendingSupps = [];
  state.pendingFrite = null;
  state.pendingDrink = null;
  state.pendingCuisson = null;
  state.pendingRemovals = [];
  state.showCustomization = false;
  state.editingItemKey = null;
  render();
}
function toggleLoyalty(){
  state.loyaltyActive = !state.loyaltyActive;
  render();
}
function toggleRemoval(item){
  const idx = state.pendingRemovals.indexOf(item);
  if(idx >= 0) state.pendingRemovals.splice(idx, 1);
  else state.pendingRemovals.push(item);
  render();
}
function toggleCustomization(){
  state.showCustomization = !state.showCustomization;
  render();
}
function confirmOrder(slot){
  if(state.currentItems.length === 0) return;
  const rawTotal = state.currentItems.reduce((sum, item) => sum + itemTotal(item), 0);
  const orderId = state._editingOrderId || state.orderNum;
  const _now = new Date();
  const order = { id:orderId, items:[...state.currentItems], rawTotal, total:rawTotal, status:"encours", loyalty:false, slot: slot || null, date: _now.toLocaleDateString('fr-FR'), heure: _now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'}) };

  for(const item of state.currentItems){
    const needed = countNeeded(getItemIngredients(item));
    for(const [k, qty] of Object.entries(needed)){
      if(state.ingredients[k]) state.ingredients[k].qty = Math.max(0, state.ingredients[k].qty - qty);
    }
  }
  state.orders.push(order);
  if(!state._editingOrderId) state.orderNum++;
  state._editingOrderId = null;
  state.loyaltyActive = false;
  state.currentItems = [];
  state.step = "burger";
  saveState();
  switchTab("caisse");
  const scrollTop = () => {
    const c = document.getElementById("content");
    if(c) c.scrollTop = 0;
    window.scrollTo(0, 0);
  };
  requestAnimationFrame(() => requestAnimationFrame(scrollTop));
  setTimeout(scrollTop, 50);
}
function toggleOrderLoyalty(id){
  const order = state.orders.find(o => o.id === id);
  if(!order || order.status === "paye") return;
  order.loyalty = !order.loyalty;
  const raw = order.rawTotal ?? order.total;
  order.rawTotal = raw;
  order.total = order.loyalty ? Math.max(0, raw - 10) : raw;
  saveState();
  render();
}
function goToFritesStep(){
  if(state.currentItems.length === 0) return;
  state.step = "frites";
  render();
  const scrollTop = () => { const c = document.getElementById("content"); if(c) c.scrollTop = 0; window.scrollTo(0,0); };
  requestAnimationFrame(() => requestAnimationFrame(scrollTop));
  setTimeout(scrollTop, 50);
}

// Drag & Drop — échange de frites entre menus
let _touchDragFriteKey = null;
let _touchGhost = null;

function swapFriteToBurger(friteKey, targetBurgerKey){
  friteKey = Number(friteKey);
  targetBurgerKey = Number(targetBurgerKey);
  const oldBurgerKey = Object.keys(state.friteMenuPairing).map(Number).find(bk => state.friteMenuPairing[bk] === friteKey);
  const friteOnTarget = state.friteMenuPairing[targetBurgerKey];
  if(oldBurgerKey !== undefined) state.friteMenuPairing[oldBurgerKey] = friteOnTarget || null;
  state.friteMenuPairing[targetBurgerKey] = friteKey;
  state.dropTargetBurgerKey = null;
  render();
}

function onFriteDragStart(e, friteKey){
  e.dataTransfer.setData('friteKey', friteKey);
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.style.opacity = '0.4', 0);
}
function onFriteDragEnd(e){ e.target.style.opacity = '1'; }

function onBurgerDragOver(e, burgerKey){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  state.dropTargetBurgerKey = Number(burgerKey);
  document.querySelectorAll('.menu-drop-zone').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll(`[data-burger-key="${burgerKey}"]`).forEach(el => el.classList.add('drag-over'));
}
function onBurgerDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onBurgerDrop(e, burgerKey){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const friteKey = e.dataTransfer.getData('friteKey');
  if(friteKey) swapFriteToBurger(friteKey, burgerKey);
}

// Touch DnD
function onFriteTouchStart(e, friteKey){
  _touchDragFriteKey = friteKey;
  const touch = e.touches[0];
  const ghost = document.createElement('div');
  ghost.id = 'drag-ghost';
  ghost.innerHTML = '🍟';
  ghost.style.cssText = `position:fixed;z-index:9999;pointer-events:none;font-size:36px;opacity:.85;
    left:${touch.clientX-18}px;top:${touch.clientY-18}px;transition:none;transform:scale(1.3)`;
  document.body.appendChild(ghost);
  _touchGhost = ghost;
}
function onFriteTouchMove(e){
  if(!_touchDragFriteKey) return;
  e.preventDefault();
  const touch = e.touches[0];
  if(_touchGhost){
    _touchGhost.style.left = (touch.clientX-18)+'px';
    _touchGhost.style.top  = (touch.clientY-18)+'px';
  }
  document.querySelectorAll('.menu-drop-zone').forEach(el => {
    const r = el.getBoundingClientRect();
    if(touch.clientX>=r.left && touch.clientX<=r.right && touch.clientY>=r.top && touch.clientY<=r.bottom){
      el.classList.add('drag-over');
      state.dropTargetBurgerKey = Number(el.dataset.burgerKey);
    } else {
      el.classList.remove('drag-over');
    }
  });
}
function onFriteTouchEnd(e){
  if(_touchGhost){ _touchGhost.remove(); _touchGhost = null; }
  if(_touchDragFriteKey && state.dropTargetBurgerKey){
    swapFriteToBurger(_touchDragFriteKey, state.dropTargetBurgerKey);
  }
  _touchDragFriteKey = null;
  state.dropTargetBurgerKey = null;
  document.querySelectorAll('.menu-drop-zone').forEach(el => el.classList.remove('drag-over'));
}
// Attacher les listeners touch globaux une seule fois
document.addEventListener('touchmove', onFriteTouchMove, {passive:false});
document.addEventListener('touchend',  onFriteTouchEnd,  {passive:false});

function playCashSound(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;

    // Ding aigu
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.frequency.setValueAtTime(1200, t);
    osc1.frequency.exponentialRampToValueAtTime(900, t + 0.08);
    gain1.gain.setValueAtTime(0.4, t);
    gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc1.start(t); osc1.stop(t + 0.18);

    // Ding grave décalé
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.frequency.setValueAtTime(800, t + 0.1);
    osc2.frequency.exponentialRampToValueAtTime(600, t + 0.22);
    gain2.gain.setValueAtTime(0.35, t + 0.1);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc2.start(t + 0.1); osc2.stop(t + 0.35);

    // Bruit mécanique (tiroir caisse)
    const bufSize = ctx.sampleRate * 0.12;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize) * 0.18;
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.25, t + 0.05);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.17);
    noise.connect(noiseGain); noiseGain.connect(ctx.destination);
    noise.start(t + 0.05);
  } catch(e) {}
}

function payOrder(id){
  const order = state.orders.find(o => o.id === id);
  if(!order) return;
  order.status = "paye";
  if(order.loyalty) state.loyaltyCount++;
  state.dailyRevenue += order.total;
  saveState();
  syncOrderToSheets(order);
  playCashSound();
  render();
}
function cancelOrder(id){
  const order = state.orders.find(o => o.id === id);
  if(!order) return;
  // Restore stock
  for(const item of order.items){
    const needed = countNeeded(getItemIngredients(item));
    for(const [k, qty] of Object.entries(needed)){
      if(state.ingredients[k]) state.ingredients[k].qty += qty;
    }
  }
  // If was paid, remove from revenue; undo loyalty count
  if(order.status === "paye") state.dailyRevenue = Math.max(0, state.dailyRevenue - order.total);
  if(order.loyalty) state.loyaltyCount = Math.max(0, state.loyaltyCount - 1);
  order.status = "annule";
  saveState();
  syncOrderToSheets(order);
  render();
}
function deleteOrder(id){
  const order = state.orders.find(o => o.id === id);
  if(!order) return;
  for(const item of order.items){
    const needed = countNeeded(getItemIngredients(item));
    for(const [k, qty] of Object.entries(needed)){
      if(state.ingredients[k]) state.ingredients[k].qty += qty;
    }
  }
  state.orders = state.orders.filter(o => o.id !== id);
  saveState();
  render();
}
function editOrder(id){
  const order = state.orders.find(o => o.id === id);
  if(!order) return;
  // Restore stock
  for(const item of order.items){
    const needed = countNeeded(getItemIngredients(item));
    for(const [k, qty] of Object.entries(needed)){
      if(state.ingredients[k]) state.ingredients[k].qty += qty;
    }
  }
  // If was paid, reverse revenue; undo loyalty count
  if(order.status === "paye") state.dailyRevenue = Math.max(0, state.dailyRevenue - order.total);
  if(order.loyalty) state.loyaltyCount = Math.max(0, state.loyaltyCount - 1);
  // Load back into ticket
  state.currentItems = order.items.map(i => ({...i, key: i.key || (Date.now() + Math.random())}));
  state._editingOrderId = order.id;
  state.loyaltyActive = order.loyalty || false;
  state.orders = state.orders.filter(o => o.id !== id);
  state.step = "burger";
  state.pendingBurger = null;
  state.pendingSupps = [];
  state.pendingFrite = null;
  state.pendingDrink = null;
  state.pendingCuisson = null;
  state.editingItemKey = null;
  saveState();
  switchTab("caisse");
}
function updateStock(key, val){
  const v = Math.max(0, parseInt(val, 10) || 0);
  if(state.ingredients[key]) state.ingredients[key].qty = v;
  saveState();
  render();
}
function adjustStock(key, delta){
  const current = state.ingredients[key]?.qty ?? 0;
  updateStock(key, current + delta);
}

const SLOTS = Array.from({length:13}, (_, i) => {
  const totalMin = 19*60 + i*10;
  const h = Math.floor(totalMin/60);
  const m = totalMin % 60;
  return `${h}h${m.toString().padStart(2,'0')}`;
});

function slotStats(slot){
  const slotOrders = state.orders.filter(o => o.slot === slot && o.status !== "annule");
  let burgers = 0, frites = 0;
  for(const o of slotOrders){
    for(const item of o.items){
      if(item.type === "burger"){ burgers++; if(item.frite) frites++; }
      else if(item.type === "fries" || item.type === "fries-menu") frites++;
      else if(item.type === "steakfrites"){ burgers++; frites++; }
    }
  }
  return { burgers, frites };
}

let _pendingSlot = null;

function openSlotModal(){
  if(state.currentItems.length === 0) return;
  _pendingSlot = null;
  renderSlotModal();
  document.getElementById("modal-slot").style.display = "flex";
}
function closeSlotModal(e){
  if(!e || e.target === document.getElementById("modal-slot")){
    document.getElementById("modal-slot").style.display = "none";
    _pendingSlot = null;
  }
}
function selectSlot(slot){
  _pendingSlot = slot;
  renderSlotModal();
  document.getElementById("slot-confirm-btn").disabled = false;
}
function renderSlotModal(){
  const col1 = SLOTS.filter(s => parseInt(s) < 20);
  const col2 = SLOTS.filter(s => parseInt(s) >= 20);

  function slotBtn(slot){
    const {burgers, frites} = slotStats(slot);
    const isSel   = _pendingSlot === slot;
    const isFull  = burgers >= 6;
    const isBusy  = burgers >= 3 && burgers < 6;
    const isLight = burgers > 0 && burgers < 3;
    let cls = 'slot-btn';
    if(isSel)        cls += ' selected';
    else if(isFull)  cls += ' full';
    else if(isBusy)  cls += ' busy';
    else if(isLight) cls += ' light';
    const warn = isFull ? ' ⚠' : '';
    return `<button class="${cls}" onclick="selectSlot('${slot}')">
      <div class="slot-time">${slot}</div>
      <div class="slot-counts">
        <span class="slot-count-pill">🍔 ${burgers}${warn}</span>
        <span class="slot-count-pill">🍟 ${frites}</span>
      </div>
    </button>`;
  }

  let html = `<div class="slot-grid">`;
  html += `<div class="slot-section-label">19 H — 20 H</div>`;
  for(const s of col1) html += slotBtn(s);
  html += `<div class="slot-section-label">20 H — 21 H</div>`;
  for(const s of col2) html += slotBtn(s);
  html += `</div>`;

  document.getElementById("slot-content").innerHTML = html;
}
function confirmOrderWithSlot(){
  if(!_pendingSlot) return;
  document.getElementById("modal-slot").style.display = "none";
  confirmOrder(_pendingSlot);
  _pendingSlot = null;
}

// ---- EXPORT EXCEL (CSV) ----
function exportExcel(){
  const url = getSheetsUrl();

  if(url){
    const orders = state.orders.filter(o => o.status !== 'annule');
    if(orders.length === 0){ alert("Aucune commande à exporter."); return; }

    // Onglet 1 : détail des commandes
    const rows = orders.map(order => {
      const items = order.items.map(i => {
        if(i.type === 'steakfrites') return 'Steak+Frites';
        if(i.type === 'fries') return i.fries.name;
        if(i.type === 'drink') return i.drink.name;
        const extras = [
          i.cuisson ? cuissonLabel(i.cuisson) : null,
          ...(i.supplements||[]).map(s => '+'+s.name),
          i.frite ? '+Frites '+i.frite.name : null,
          i.drink ? '+'+i.drink.name : null,
          ...(i.removals||[]).map(r => '-'+r)
        ].filter(Boolean);
        return i.burger.name + (extras.length ? ' ('+extras.join(', ')+')' : '');
      }).join(' | ');
      const ttc = order.total;
      return {
        id: order.id,
        date: order.date || new Date().toLocaleDateString('fr-FR'),
        heure: order.heure || '',
        creneau: order.slot || '',
        statut: order.status === 'paye' ? 'Reglée' : 'En cours',
        articles: items,
        total_ttc: fmtNum(ttc),
        total_ht: fmtNum(ttc / 1.10),
        tva: fmtNum(ttc - ttc / 1.10),
        fidelite: order.loyalty ? 'Oui' : 'Non'
      };
    });

    // Synthèse journalière — uniquement commandes réglées (= ce qui est dans le CA)
    const today = new Date().toLocaleDateString('fr-FR');
    const paidOrders = state.orders.filter(o => o.status === 'paye');

    const burgerNames = BURGERS.map(b => b.name);
    const counts = {};
    burgerNames.forEach(n => counts[n] = 0);
    let totalBurgers = 0, totalFrites = 0, totalDouble = 0;

    for(const order of paidOrders){
      for(const item of order.items){
        if(item.type === 'burger'){
          counts[item.burger.name]++;
          totalBurgers++;
          if(item.frite) totalFrites++;
          if((item.supplements||[]).some(sup => sup.id === 'double' || sup.name === 'Double steak & fromage')) totalDouble++;
        } else if(item.type === 'steakfrites'){
          counts['Le Steak Haché']++;
          totalBurgers++;
          totalFrites++;
        } else if(item.type === 'fries' || item.type === 'fries-menu'){
          totalFrites++;
        }
      }
    }
    const statsRow = {
      date: today,
      counts,
      burgerNames,
      total_burgers: totalBurgers,
      total_frites: totalFrites,
      total_double: totalDouble,
      ca_ttc: fmtNum(state.dailyRevenue),
      ca_ht:  fmtNum(state.dailyRevenue / 1.10),
      tva:    fmtNum(state.dailyRevenue - state.dailyRevenue / 1.10)
    };

    fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({stats: statsRow})
    }).catch(() => {});

    alert(`✓ Synthèse du ${today} envoyée vers Google Sheets.`);
    return;
  }

  // Fallback : export CSV local
  const csvRows = [];
  csvRows.push(["Commande", "Statut", "Article", "Type", "Détail", "Cuisson", "Prix (€)", "Total TTC (€)", "Total HT (€)", "TVA (€)"]);

  for(const order of state.orders){
    const statusLabel = order.status === "paye" ? "Réglée" : order.status === "annule" ? "Annulée" : "En cours";
    for(let i = 0; i < order.items.length; i++){
      const item = order.items[i];
      let type = "", detail = "", cuisson = "", prix = 0;
      if(item.type === "fries" || item.type === "fries-menu"){
        type = "Frites"; detail = item.fries.name; prix = item.fries.price;
      } else if(item.type === "drink"){
        type = "Boisson"; detail = item.drink.name; prix = item.drink.price;
      } else if(item.type === "steakfrites"){
        type = "Combo"; detail = "Steak + Frites"; prix = STEAK_FRITES.price;
      } else {
        type = "Burger";
        const extras = [
          ...(item.supplements||[]).map(s => s.name),
          item.frite ? 'Frites ' + item.frite.name : '',
          item.drink ? item.drink.name : ''
        ].filter(Boolean).join(' | ');
        detail = item.burger.name + (extras ? ' — ' + extras : '');
        cuisson = item.cuisson ? cuissonLabel(item.cuisson) : '';
        prix = itemTotal(item);
      }
      const ttc = i === 0 ? order.total : 0;
      csvRows.push([
        "#" + order.id, i === 0 ? statusLabel : "",
        i + 1, type, detail, cuisson,
        fmtNum(prix),
        i === 0 ? fmtNum(ttc) : "",
        i === 0 ? fmtNum(ttc / 1.10) : "",
        i === 0 ? fmtNum(ttc - ttc / 1.10) : ""
      ]);
    }
  }
  csvRows.push([]);
  csvRows.push(["", "", "", "", "", "CA TOTAL", "", fmtNum(state.dailyRevenue), fmtNum(state.dailyRevenue/1.10), fmtNum(state.dailyRevenue-state.dailyRevenue/1.10)]);

  const csv = csvRows.map(row =>
    row.map(cell => {
      const s = String(cell ?? "").replace(/"/g, '""');
      return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s}"` : s;
    }).join(",")
  ).join("\r\n");

  const bom = "\uFEFF";
  const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
  const url2 = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url2;
  const d = new Date();
  a.download = `foodtruck_${d.getDate().toString().padStart(2,"0")}${(d.getMonth()+1).toString().padStart(2,"0")}${d.getFullYear()}.csv`;
  a.click();
  URL.revokeObjectURL(url2);
}

    html += `<button class="mini-card" onclick="addDrink('${d.id}')">
      <div class="mini-name">${d.name}</div>
      <div class="mini-price">${fmt(d.price)}</div>
    </button>`;
  }
  html += '</div>';

  if(state.currentItems.length > 0){
    const editingLabel = state._editingOrderId
      ? `<span style="color:var(--gold);font-size:12px;margin-left:6px">✏️ Modification commande #${state._editingOrderId}</span>`
      : '';
    html += `<div class="ticket"><div class="ticket-title">🧾 TICKET EN COURS${editingLabel}</div>`;
    for(const item of state.currentItems){
      if(item.type === "fries" || item.type === "fries-menu"){
        html += `<div class="ticket-item">
          <div>
            <div class="ticket-item-name">${item.fries.name}</div>
            <div class="ticket-item-sub">Portion seule</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="ticket-item-price">${fmt(itemTotal(item))}</div>
            <button class="remove-btn" onclick="removeItem(${item.key})">×</button>
          </div>
        </div>`;
      } else if(item.type === "drink"){
        html += `<div class="ticket-item">
          <div>
            <div class="ticket-item-name">${item.drink.name}</div>
            <div class="ticket-item-sub">Boisson</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="ticket-item-price">${fmt(itemTotal(item))}</div>
            <button class="remove-btn" onclick="removeItem(${item.key})">×</button>
          </div>
        </div>`;
      } else if(item.type === "steakfrites"){
        html += `<div class="ticket-item">
          <div>
            <div class="ticket-item-name">🥩 Steak + Frites</div>
            <div class="ticket-item-sub">Formule</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="ticket-item-price">${fmt(itemTotal(item))}</div>
            <button class="remove-btn" onclick="removeItem(${item.key})">×</button>
          </div>
        </div>`;
      } else {
        const cuissonInfo = item.cuisson ? `${cuissonDot(item.cuisson)}<span>${cuissonLabel(item.cuisson)}</span>` : '';
        const nameColor = item.cuisson ? cuissonColor(item.cuisson) : 'var(--text)';
        html += `<div class="ticket-item">
          <div style="flex:1">
            <div class="ticket-item-name" style="color:${nameColor}">${item.burger.name}</div>
            ${item.cuisson ? `<div class="ticket-item-sub">${cuissonInfo}</div>` : ''}
            ${(item.supplements || []).map(s => `<div class="ticket-item-sub">+ ${s.name}</div>`).join('')}
            ${(item.removals || []).map(r => `<div class="ticket-item-sub" style="color:var(--red)">✕ Sans ${r}</div>`).join('')}
            ${item.frite ? `<div class="ticket-item-sub">+ Frites ${item.frite.name}</div>` : ''}
            ${item.drink ? `<div class="ticket-item-sub">+ Boisson ${item.drink.name}</div>` : ''}
            <button class="ticket-item-edit" onclick="editItem(${item.key})">✏️ Modifier</button>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="ticket-item-price">${fmt(itemTotal(item))}</div>
            <button class="remove-btn" onclick="removeItem(${item.key})">×</button>
          </div>
        </div>`;
      }
    }
    const rawTotal = state.currentItems.reduce((sum, item) => sum + itemTotal(item), 0);
    const finalTotal = rawTotal;
    html += `<div class="ticket-footer">
      <div style="flex:1">
        <div class="ticket-count">${state.currentItems.length} article${state.currentItems.length > 1 ? 's' : ''}</div>
        <div class="ticket-total">${fmt(finalTotal)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="goToFritesStep()">🍟 Passer aux frites →</button>
      </div>
    </div></div>`;
  }
  html += '</div>';
  return html;
}

function renderOptions(){
  const b = state.pendingBurger;
  const suppTotal = state.pendingSupps.reduce((sum, s) => sum + s.price, 0);
  const total = b.price + suppTotal;
  const isEditing = !!state.editingItemKey;

  let html = '<div class="pad">';
  html += `<div class="options-header">
    <button class="btn-back" onclick="goBackToBurger()">← Retour</button>
    <div class="options-title">${b.name} — ${fmt(b.price)}</div>
  </div>`;

  // Cuisson
  html += '<div class="section-title">Cuisson</div><div class="grid-4">';
  for(const c of CUISSONS){
    const sel = state.pendingCuisson === c.id;
    html += `<button class="option-card ${c.cssClass}${sel ? ' selected' : ''}" onclick="selectCuisson('${c.id}')">
      <div class="option-card-label" style="display:flex;align-items:center;justify-content:center;gap:6px">
        <span class="cuisson-dot ${c.dotClass}"></span>${c.name}
      </div>
    </button>`;
  }
  html += '</div>';

  // Supplements
  html += '<div class="section-title">Suppléments burger</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
  for(const s of SUPPLEMENTS){
    const sel = state.pendingSupps.some(x => x.id === s.id);
    const avail = optionAvailable(s);
    html += `<button class="option-card${sel ? ' selected' : ''}${avail ? '' : ' unavailable'}" onclick="${avail ? `toggleSupp('${s.id}')` : ''}">
      <div class="option-card-label">${s.name}</div>
      <div class="option-card-price">+ ${fmt(s.price)}</div>
    </button>`;
  }
  html += '</div>';

  // Personnalisation — retrait d'ingrédients (masqué par défaut)
  const customs = BURGER_CUSTOMS[b.id];
  const hasCustoms = customs && [...customs.fromage, ...customs.sauces, ...customs.garnitures].length > 0;
  const removalsCount = state.pendingRemovals.length;

  // Recap
  html += `<div class="recap" style="margin-top:20px">
    <div class="section-title" style="margin-top:0">Récapitulatif</div>
    <div class="recap-row" style="align-items:center">
      <span style="display:flex;align-items:center;gap:8px;flex:1">
        ${b.name}
        ${hasCustoms ? `<button onclick="toggleCustomization()" style="border:none;cursor:pointer;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:bold;flex-shrink:0;${state.showCustomization ? 'background:#fce8e8;color:var(--red);border:1px solid #e8a0a0' : 'background:#fff0d8;color:var(--gold);border:1px solid #ecc791'}">
          ✏️ Modifier${removalsCount > 0 ? ' (' + removalsCount + ')' : ''} ${state.showCustomization ? '▲' : '▼'}
        </button>` : ''}
      </span>
      <span>${fmt(b.price)}</span>
    </div>
    ${state.pendingCuisson ? `<div class="recap-row sub"><span>${cuissonDot(state.pendingCuisson)} Cuisson : ${cuissonLabel(state.pendingCuisson)}</span><span></span></div>` : ''}
    ${state.pendingRemovals.map(r => `<div class="recap-row sub"><span style="color:var(--red)">✕ Sans ${r}</span><span></span></div>`).join('')}
    ${state.pendingSupps.map(s => `<div class="recap-row sub"><span>+ ${s.name}</span><span>${fmt(s.price)}</span></div>`).join('')}
    <div class="recap-total"><span>Total</span><span>${fmt(total)}</span></div>
  </div>`;

  // Panneau de personnalisation (visible seulement si ouvert)
  if(hasCustoms && state.showCustomization){
    const allItems = [
      ...customs.fromage.map(x => ({item:x, cat:"🧀"})),
      ...customs.sauces.map(x => ({item:x, cat:"🫙"})),
      ...customs.garnitures.map(x => ({item:x, cat:"🥗"}))
    ];
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
    for(const {item, cat} of allItems){
      const removed = state.pendingRemovals.includes(item);
      html += `<button class="removal-btn${removed ? ' removed' : ''}" onclick="toggleRemoval('${item.replace(/'/g,"\\'")}')">
        <div style="font-size:11px;margin-bottom:2px">${cat}</div>
        <div style="font-size:12px">${removed ? '✕ ' : ''}${item}</div>
      </button>`;
    }
    html += '</div>';
  }

  html += `<button class="btn btn-primary" onclick="addBurgerItem()">${isEditing ? '✓ Mettre à jour' : '+ Ajouter au ticket'}</button>`;
  html += '</div>';
  return html;
}

function renderOrderItems(order){
  let html = '';
  for(const item of order.items){
    if(item.type === "fries" || item.type === "fries-menu"){
      html += `<div class="order-item"><div><div class="order-item-name">${item.fries.name}</div><div class="order-item-sub">Portion seule</div></div></div>`;
    } else if(item.type === "drink"){
      html += `<div class="order-item"><div><div class="order-item-name">${item.drink.name}</div><div class="order-item-sub">Boisson</div></div></div>`;
    } else if(item.type === "steakfrites"){
      html += `<div class="order-item"><div><div class="order-item-name">🥩 Steak + Frites</div><div class="order-item-sub">Formule</div></div></div>`;
    } else {
      const cuisson = item.cuisson ? `<div class="order-item-sub">${cuissonDot(item.cuisson)} Cuisson : ${cuissonLabel(item.cuisson)}</div>` : '';
      const nameColor = item.cuisson ? cuissonColor(item.cuisson) : 'var(--text)';
      html += `<div class="order-item">
        <div>
          <div class="order-item-name" style="color:${nameColor}">${item.burger.name}</div>
          ${cuisson}
          ${(item.supplements || []).map(s => `<div class="order-item-sub">+ ${s.name}</div>`).join('')}
          ${(item.removals || []).map(r => `<div class="order-item-sub" style="color:var(--red);font-weight:bold">✕ SANS ${r.toUpperCase()}</div>`).join('')}
          ${item.frite ? `<div class="order-item-sub">+ Frites ${item.frite.name}</div>` : ''}
          ${item.drink ? `<div class="order-item-sub">+ Boisson ${item.drink.name}</div>` : ''}
        </div>
      </div>`;
    }
  }
  if(order.loyalty) html += `<div style="font-size:11px;color:var(--red);padding:4px 0;border-top:1px solid var(--line);margin-top:4px">🎫 Carte fidélité — 10,00 € déduits</div>`;
  return html;
}

function renderEnCours(){
  const sortBySlot = (a, b) => {
    if(!a.slot && !b.slot) return a.id - b.id;
    if(!a.slot) return 1;
    if(!b.slot) return -1;
    return a.slot.localeCompare(b.slot) || a.id - b.id;
  };
  const encours = state.orders.filter(o => o.status === "encours").sort(sortBySlot);
  const payes   = state.orders.filter(o => o.status === "paye").sort(sortBySlot);
  const annules = state.orders.filter(o => o.status === "annule");
  let html = '<div class="pad">';

  if(encours.length === 0){
    html += '<div class="empty"><div class="empty-icon">🍳</div><div>Aucune commande en cours</div></div>';
  }

  for(const order of encours){
    html += `<div class="order-card" id="order-card-${order.id}">
      <div class="order-header">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <div class="order-num">#${order.id}</div>
          ${order.slot ? `<span style="font-size:12px;background:#fff0d8;color:var(--gold);border:1px solid #ecc791;border-radius:8px;padding:3px 10px;font-weight:bold">🕐 ${order.slot}</span>` : ''}
          ${order.loyalty ? `<span style="font-size:12px;background:#fce8e8;color:var(--red);border:1px solid #e8a0a0;border-radius:8px;padding:3px 10px;font-weight:bold">🎫 −10,00 €</span>` : ''}
        </div>
        <div class="order-total">${fmt(order.total)}</div>
      </div>
      ${renderOrderItems(order)}
      <div style="display:flex;justify-content:flex-end;gap:14px;padding:5px 0 8px;border-top:1px dashed var(--line);margin-top:4px">
        <span style="font-size:12px;color:var(--text-soft)">HT <span style="font-family:'Courier New',monospace;font-weight:bold;color:var(--text)">${fmt(order.total/1.10)}</span></span>
        <span style="font-size:12px;color:var(--text-soft)">TVA 10% <span style="font-family:'Courier New',monospace;font-weight:bold;color:var(--orange)">${fmt(order.total-order.total/1.10)}</span></span>
      </div>
      <div class="order-actions">
        <button class="btn btn-cancel" onclick="cancelOrder(${order.id})">✕ Annuler</button>
        <button class="btn" style="flex:1;background:#fff0d8;color:var(--gold);border:1px solid #ecc791" onclick="editOrder(${order.id})">✏️ Modifier</button>
        <button class="btn" style="padding:9px 16px;font-size:12px;white-space:nowrap;${order.loyalty ? 'background:linear-gradient(180deg,#d94f4f,#b03030);color:white' : 'background:#fff0d8;color:var(--gold);border:1px solid #ecc791'}" onclick="toggleOrderLoyalty(${order.id})">🎫 Fidélité</button>
        <button class="btn btn-pay" onclick="payOrder(${order.id})">💳 ${fmt(order.total)}</button>
      </div></div>`;
  }

  if(payes.length > 0){
    html += '<div class="history-label">COMMANDES RÉGLÉES</div>';
    for(const order of payes){
      html += `<div class="order-card" id="order-card-${order.id}" style="opacity:.8">
        <div class="order-header">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div class="order-num" style="background:var(--green)">#${order.id}</div>
            ${order.slot ? `<span style="font-size:12px;background:#e0f4eb;color:var(--green);border:1px solid #90cca8;border-radius:8px;padding:3px 10px;font-weight:bold">🕐 ${order.slot}</span>` : ''}
            ${order.loyalty ? `<span style="font-size:12px;background:#fce8e8;color:var(--red);border:1px solid #e8a0a0;border-radius:8px;padding:3px 10px;font-weight:bold">🎫 Fidélité</span>` : ''}
          </div>
          <div class="order-total">${fmt(order.total)}</div>
        </div>
        ${renderOrderItems(order)}
        <div style="display:flex;justify-content:flex-end;gap:14px;padding:5px 0 8px;border-top:1px dashed var(--line);margin-top:4px">
          <span style="font-size:12px;color:var(--text-soft)">HT <span style="font-family:'Courier New',monospace;font-weight:bold;color:var(--text)">${fmt(order.total/1.10)}</span></span>
          <span style="font-size:12px;color:var(--text-soft)">TVA 10% <span style="font-family:'Courier New',monospace;font-weight:bold;color:var(--orange)">${fmt(order.total-order.total/1.10)}</span></span>
        </div>
        <div class="order-actions">
          <button class="btn btn-cancel" onclick="cancelOrder(${order.id})">✕ Annuler</button>
          <button class="btn" style="flex:2;background:#fff0d8;color:var(--gold);border:1px solid #ecc791" onclick="editOrder(${order.id})">✏️ Modifier</button>
        </div></div>`;
    }
    html += `<div class="summary-card">
      <div class="summary-label">CA TOTAL DU JOUR</div>
      <div class="summary-value">${fmt(state.dailyRevenue)}</div>
    </div>`;
  }

  if(annules.length > 0){
    html += '<div class="history-label">COMMANDES ANNULÉES</div>';
    for(const order of annules){
      html += `<div class="order-card" id="order-card-${order.id}" style="opacity:.45">
        <div class="order-header">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="order-num">#${order.id}</div>
            ${order.slot ? `<span style="font-size:12px;background:var(--bg-2);color:var(--text-soft);border:1px solid var(--line);border-radius:8px;padding:3px 10px;font-weight:bold">🕐 ${order.slot}</span>` : ''}
          </div>
          <div style="font-size:16px;color:var(--text-soft);font-weight:bold">${fmt(order.total)}</div>
        </div>
        ${renderOrderItems(order)}
        <div class="order-actions">
          <button class="btn" style="flex:1;background:#fff0d8;color:var(--gold);border:1px solid #ecc791" onclick="editOrder(${order.id})">✏️ Ré-ouvrir</button>
        </div></div>`;
    }
  }

  html += '</div>';
  return html;
}

function renderHistorique(){
  let html = '<div class="pad">';

  if(state.orders.length === 0){
    html += '<div class="empty"><div class="empty-icon">📋</div><div>Aucune commande enregistrée</div></div>';
  } else {
    for(const order of state.orders){
      const isPaye = order.status === 'paye';
      const isAnn  = order.status === 'annule';
      const statusBadge = isPaye
        ? `<span style="font-size:11px;background:#e0f4eb;color:var(--green);border:1px solid #90cca8;border-radius:6px;padding:2px 8px;font-weight:bold">✓ Réglée</span>`
        : isAnn
        ? `<span style="font-size:11px;background:#fce0e0;color:var(--red);border:1px solid #e8a0a0;border-radius:6px;padding:2px 8px;font-weight:bold">✕ Annulée</span>`
        : `<span style="font-size:11px;background:#fff0d8;color:var(--gold);border:1px solid #ecc791;border-radius:6px;padding:2px 8px;font-weight:bold">⏳ En cours</span>`;

      html += `<div class="order-card" style="margin-bottom:10px${isAnn ? ';opacity:.5' : ''}">
        <div class="order-header">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div class="order-num" style="${isPaye ? 'background:var(--green)' : isAnn ? 'background:var(--text-soft)' : ''}">#${order.id}</div>
            ${statusBadge}
            ${order.slot ? `<span style="font-size:11px;background:#fff0d8;color:var(--gold);border:1px solid #ecc791;border-radius:6px;padding:2px 8px;font-weight:bold">🕐 ${order.slot}</span>` : ''}
            ${order.loyalty ? `<span style="font-size:11px;color:var(--red)">🎫</span>` : ''}
          </div>
          <div class="order-total" style="${isAnn ? 'color:var(--text-soft)' : ''}">${fmt(order.total)}</div>
        </div>
        ${renderOrderItems(order)}
        ${!isAnn ? `<div style="display:flex;justify-content:flex-end;gap:14px;padding:5px 0 2px;border-top:1px dashed var(--line);margin-top:4px">
          <span style="font-size:12px;color:var(--text-soft)">HT <span style="font-family:'Courier New',monospace;font-weight:bold;color:var(--text)">${fmt(order.total/1.10)}</span></span>
          <span style="font-size:12px;color:var(--text-soft)">TVA 10% <span style="font-family:'Courier New',monospace;font-weight:bold;color:var(--orange)">${fmt(order.total-order.total/1.10)}</span></span>
        </div>` : ''}
      </div>`;
    }
  }

  html += '</div>';
  return html;
}

function renderStocks(){
  const categories = [...new Set(Object.values(INGREDIENTS_DEFAULT).map(i => i.category))];
  const low = Object.values(state.ingredients).filter(i => i.qty <= 5 && i.qty > 0).length;
  const out = Object.values(state.ingredients).filter(i => i.qty === 0).length;
  const sheetsUrl = getSheetsUrl();
  let html = '<div class="pad">';

  // Google Sheets config
  html += `<div class="stock-card" style="margin-bottom:14px">
    <div class="section-title" style="margin-top:0">📊 Sync Google Sheets</div>
    <div style="font-size:12px;color:var(--text-soft);margin-bottom:10px">
      ${sheetsUrl
        ? `<span style="color:var(--green);font-weight:bold">✓ Connecté</span> — chaque encaissement est envoyé automatiquement.`
        : `Colle l'URL de ton Apps Script pour activer la sync automatique.`}
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <input id="sheets-url-input" type="url" placeholder="https://script.google.com/macros/s/…/exec"
        value="${sheetsUrl}"
        style="flex:1;height:38px;border-radius:10px;border:1px solid var(--line);background:white;color:var(--text);padding:0 10px;font-size:12px">
      <button class="btn btn-primary" style="white-space:nowrap;padding:10px 14px;font-size:12px"
        onclick="saveSheetsUrl()">Enregistrer</button>
      ${sheetsUrl ? `<button class="btn btn-cancel" style="padding:10px 12px;font-size:12px;flex:unset"
        onclick="clearSheetsUrl()">✕</button>` : ''}
    </div>
  </div>`;

  if(low > 0 || out > 0){
    html += '<div class="alert-box">';
    if(out > 0) html += `<div class="alert-out">⚠️ ${out} ingrédient${out > 1 ? 's' : ''} épuisé${out > 1 ? 's' : ''}</div>`;
    if(low > 0) html += `<div class="alert-low">⚡ ${low} en stock faible (≤ 5)</div>`;
    html += '</div>';
  }

  for(const cat of categories){
    html += `<div class="stock-card" style="margin-bottom:14px">
      <div class="section-title" style="margin-top:0">${cat}</div>`;
    for(const [key, ing] of Object.entries(state.ingredients)){
      if(ing.category !== cat) continue;
      const isOut = ing.qty === 0;
      const isLow = ing.qty > 0 && ing.qty <= 5;
      html += `<div class="stock-item">
        <div class="stock-name${isOut ? ' out' : isLow ? ' low' : ''}">${ing.name}</div>
        <div class="stock-inline">
          <button class="stock-step" onclick="adjustStock('${key}', -1)">−</button>
          <input class="edit-input" type="number" min="0" value="${ing.qty}" onchange="updateStock('${key}', this.value)">
          <button class="stock-step" onclick="adjustStock('${key}', 1)">+</button>
          <button class="stock-save" onclick="updateStock('${key}', this.previousElementSibling.previousElementSibling.value)">OK</button>
        </div>
      </div>`;
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

if('serviceWorker' in navigator){
  // Désactive tous les anciens service workers pour forcer le rechargement
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.unregister());
  });
}

function saveSheetsUrl(){
  const v = document.getElementById('sheets-url-input')?.value || '';
  setSheetsUrl(v);
  render();
}
function clearSheetsUrl(){
  setSheetsUrl('');
  render();
}

loadState();
render();
</script>
</body>
</html>
